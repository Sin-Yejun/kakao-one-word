name: Daily Crawl

on:
  schedule:
    # KST 05:00 = UTC 20:00 (전날)
    - cron: "0 20 * * *"
    # KST 06:00 = UTC 21:00 (전날)
    - cron: "0 21 * * *"

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger crawl
        run: |
          curl -f -s -o /dev/null -w "%{http_code}" \
            "REDACTED/crawl?secret=${{ secrets.CRON_SECRET }}"
